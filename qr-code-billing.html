<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Privacy Billing with QR Code</title>
    
    <!-- QR Code Library -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.2);
        }

        .card {
            background: white;
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            margin-bottom: 20px;
        }

        .btn {
            padding: 15px 30px;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
            margin: 5px;
        }

        .btn:hover {
            transform: translateY(-2px);
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-secondary {
            background: #25D366;
            color: white;
        }

        .btn-back {
            background: #f0f0f0;
            color: #333;
        }

        .section {
            display: none;
        }

        .section.active {
            display: block;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 600;
        }

        .form-group input {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 1rem;
        }

        .form-group input:focus {
            outline: none;
            border-color: #667eea;
        }

        .oti-display {
            margin-top: 30px;
            text-align: center;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 10px;
        }

        .oti-code {
            font-size: 2.5rem;
            font-weight: bold;
            color: #764ba2;
            letter-spacing: 5px;
            padding: 20px;
            background: white;
            border-radius: 8px;
            border: 3px dashed #667eea;
            margin: 10px 0;
        }

        /* QR Code Styling */
        #qrcode {
            display: inline-block;
            padding: 20px;
            background: white;
            border-radius: 10px;
            margin: 20px 0;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .qr-instructions {
            background: #fff3cd;
            padding: 15px;
            border-radius: 8px;
            border-left: 4px solid #ffc107;
            margin: 15px 0;
        }

        .qr-instructions h4 {
            color: #856404;
            margin-bottom: 10px;
        }

        .qr-instructions p {
            color: #856404;
            margin: 5px 0;
        }

        .message {
            padding: 15px;
            border-radius: 8px;
            margin-top: 20px;
            text-align: center;
        }

        .message.success {
            background: #d4edda;
            color: #155724;
        }

        .message.error {
            background: #f8d7da;
            color: #721c24;
        }

        .receipt-card {
            background: white;
            padding: 30px;
            border-radius: 15px;
            margin-top: 20px;
        }

        .receipt-row {
            display: flex;
            justify-content: space-between;
            padding: 15px 0;
            border-bottom: 1px solid #f0f0f0;
        }

        .receipt-row .label {
            font-weight: 600;
            color: #666;
        }

        .receipt-row .value {
            font-weight: 500;
            color: #333;
        }

        .receipt-row .value.amount {
            font-size: 1.5rem;
            color: #667eea;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🔒 Privacy Billing System</h1>
            <p style="font-size: 1.1rem; opacity: 0.9;">with QR Code & WhatsApp</p>
        </div>

        <!-- Home Section -->
        <div id="homeSection" class="section active">
            <div class="card">
                <h2 style="color: #667eea; margin-bottom: 20px; text-align: center;">Welcome!</h2>
                <button class="btn btn-primary" onclick="showSection('billing')" style="width: 100%; margin-bottom: 10px;">
                    Generate New Bill
                </button>
                <button class="btn btn-back" onclick="showSection('verify')" style="width: 100%;">
                    View Receipt
                </button>
            </div>
        </div>

        <!-- Billing Section -->
        <div id="billingSection" class="section">
            <div class="card">
                <button class="btn btn-back" onclick="showSection('home')">← Back</button>

                <h2 style="color: #667eea; margin: 20px 0;">Generate Bill</h2>

                <form id="billingForm" onsubmit="generateBill(event)">
                    <div class="form-group">
                        <label for="phone">Phone Number (with country code)</label>
                        <input 
                            type="tel" 
                            id="phone" 
                            placeholder="e.g., 919876543210" 
                            required
                        >
                        <small style="color: #666;">Format: Country code + number (e.g., 919876543210 for India)</small>
                    </div>

                    <div class="form-group">
                        <label for="amount">Bill Amount (₹)</label>
                        <input 
                            type="number" 
                            id="amount" 
                            placeholder="0.00" 
                            step="0.01" 
                            min="0.01" 
                            required
                        >
                    </div>

                    <button type="submit" class="btn btn-primary" style="width: 100%;">
                        Generate OTI & QR Code
                    </button>
                </form>

                <div id="billingMessage"></div>
            </div>
        </div>

        <!-- Verify Section -->
        <div id="verifySection" class="section">
            <div class="card">
                <button class="btn btn-back" onclick="showSection('home')">← Back</button>

                <h2 style="color: #667eea; margin: 20px 0;">View Receipt</h2>

                <form id="verifyForm" onsubmit="verifyOTI(event)">
                    <div class="form-group">
                        <label for="otiInput">Enter Your OTI</label>
                        <input 
                            type="text" 
                            id="otiInput" 
                            placeholder="8-character OTI" 
                            required
                            maxlength="8"
                            style="text-transform: uppercase;"
                        >
                    </div>

                    <button type="submit" class="btn btn-primary" style="width: 100%;">
                        View Receipt
                    </button>
                </form>

                <div id="verifyMessage"></div>
                <div id="receiptDisplay"></div>
            </div>
        </div>
    </div>

    <script>
        // ============================================
        // STORAGE FUNCTIONS
        // ============================================
        
        function saveBill(oti, amount, time, phone) {
            const bills = JSON.parse(localStorage.getItem('bills') || '{}');
            bills[oti] = {
                amount: amount,
                time: time,
                phone: phone // Store for WhatsApp (optional)
            };
            localStorage.setItem('bills', JSON.stringify(bills));
        }

        function getBill(oti) {
            const bills = JSON.parse(localStorage.getItem('bills') || '{}');
            return bills[oti] || null;
        }

        function generateOTI() {
            const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789';
            let oti = '';
            for (let i = 0; i < 8; i++) {
                oti += chars.charAt(Math.floor(Math.random() * chars.length));
            }
            return oti;
        }

        function getCurrentDateTime() {
            const now = new Date();
            const day = String(now.getDate()).padStart(2, '0');
            const month = String(now.getMonth() + 1).padStart(2, '0');
            const year = now.getFullYear();
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            const seconds = String(now.getSeconds()).padStart(2, '0');
            return `${day}-${month}-${year} ${hours}:${minutes}:${seconds}`;
        }

        // ============================================
        // QR CODE FUNCTION
        // ============================================
        
        function generateQRCode(oti) {
            // Clear previous QR code if exists
            const qrContainer = document.getElementById('qrcode');
            if (qrContainer) {
                qrContainer.innerHTML = '';
            }

            // Get current page URL
            const currentURL = window.location.href.split('?')[0];
            const receiptURL = `${currentURL}?oti=${oti}`;

            // Generate QR Code
            new QRCode(qrContainer, {
                text: receiptURL,
                width: 200,
                height: 200,
                colorDark: "#667eea",
                colorLight: "#ffffff",
                correctLevel: QRCode.CorrectLevel.H
            });

            return receiptURL;
        }

        // ============================================
        // WHATSAPP FUNCTION
        // ============================================
        
        function sendWhatsApp(phone, oti, amount) {
            const message = `🧾 *Restaurant Bill Receipt*\n\n` +
                          `Amount: ₹${amount}\n` +
                          `Receipt Code: ${oti}\n\n` +
                          `Use this code to view your receipt anytime!\n` +
                          `${window.location.href.split('?')[0]}?oti=${oti}`;
            
            const whatsappURL = `https://wa.me/${phone}?text=${encodeURIComponent(message)}`;
            window.open(whatsappURL, '_blank');
        }

        // ============================================
        // NAVIGATION
        // ============================================
        
        function showSection(section) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            
            if (section === 'home') {
                document.getElementById('homeSection').classList.add('active');
            } else if (section === 'billing') {
                document.getElementById('billingSection').classList.add('active');
                document.getElementById('billingForm').reset();
                document.getElementById('billingMessage').innerHTML = '';
            } else if (section === 'verify') {
                document.getElementById('verifySection').classList.add('active');
                document.getElementById('verifyForm').reset();
                document.getElementById('verifyMessage').innerHTML = '';
                document.getElementById('receiptDisplay').innerHTML = '';
            }
        }

        // ============================================
        // GENERATE BILL
        // ============================================
        
        function generateBill(event) {
            event.preventDefault();
            
            const phone = document.getElementById('phone').value;
            const amount = parseFloat(document.getElementById('amount').value);
            
            if (isNaN(amount) || amount <= 0) {
                document.getElementById('billingMessage').innerHTML = 
                    '<div class="message error">Please enter valid amount!</div>';
                return;
            }
            
            const oti = generateOTI();
            const time = getCurrentDateTime();
            
            // Save bill with phone for WhatsApp
            saveBill(oti, amount, time, phone);
            
            // Clear form
            document.getElementById('billingForm').reset();
            
            // Show success with QR code
            document.getElementById('billingMessage').innerHTML = `
                <div class="message success">
                    Bill created successfully!
                </div>
                <div class="oti-display">
                    <h3 style="color: #667eea;">Your Receipt Code:</h3>
                    <div class="oti-code">${oti}</div>
                    
                    <h3 style="color: #667eea; margin-top: 30px;">Scan QR Code:</h3>
                    <div id="qrcode"></div>
                    
                    <div class="qr-instructions">
                        <h4>📱 How to Use QR Code:</h4>
                        <p>1. Open camera on your phone</p>
                        <p>2. Point at QR code above</p>
                        <p>3. Tap the notification to view receipt</p>
                    </div>
                    
                    <button class="btn btn-primary" onclick="copyOTI('${oti}')">
                        📋 Copy OTI
                    </button>
                    
                    <button class="btn btn-secondary" onclick="sendWhatsAppFromBill('${phone}', '${oti}', ${amount})">
                        💬 Send via WhatsApp
                    </button>
                    
                    <button class="btn btn-back" onclick="downloadQR()" style="margin-top: 10px;">
                        💾 Download QR Code
                    </button>
                </div>
            `;
            
            // Generate the QR code after HTML is inserted
            setTimeout(() => generateQRCode(oti), 100);
        }

        function sendWhatsAppFromBill(phone, oti, amount) {
            sendWhatsApp(phone, oti, amount);
        }

        // ============================================
        // UTILITY FUNCTIONS
        // ============================================
        
        function copyOTI(oti) {
            navigator.clipboard.writeText(oti).then(() => {
                alert('✅ OTI copied to clipboard!');
            });
        }

        function downloadQR() {
            const canvas = document.querySelector('#qrcode canvas');
            if (canvas) {
                const link = document.createElement('a');
                link.download = 'receipt-qr-code.png';
                link.href = canvas.toDataURL();
                link.click();
            }
        }

        // ============================================
        // VERIFY OTI
        // ============================================
        
        function verifyOTI(event) {
            event.preventDefault();
            
            const oti = document.getElementById('otiInput').value.toUpperCase().trim();
            
            if (!oti) {
                document.getElementById('verifyMessage').innerHTML = 
                    '<div class="message error">Please enter an OTI!</div>';
                return;
            }
            
            const bill = getBill(oti);
            
            if (!bill) {
                document.getElementById('verifyMessage').innerHTML = 
                    '<div class="message error">Invalid OTI. Please check and try again.</div>';
                document.getElementById('receiptDisplay').innerHTML = '';
                return;
            }
            
            showReceipt(oti, bill);
        }

        function showReceipt(oti, bill) {
            document.getElementById('verifyMessage').innerHTML = '';
            document.getElementById('receiptDisplay').innerHTML = `
                <div class="receipt-card">
                    <h2 style="color: #667eea; text-align: center; margin-bottom: 20px;">
                        🧾 Receipt
                    </h2>
                    
                    <div class="receipt-row">
                        <span class="label">OTI:</span>
                        <span class="value">${oti}</span>
                    </div>
                    
                    <div class="receipt-row">
                        <span class="label">Amount:</span>
                        <span class="value amount">₹${bill.amount.toFixed(2)}</span>
                    </div>
                    
                    <div class="receipt-row">
                        <span class="label">Date & Time:</span>
                        <span class="value">${bill.time}</span>
                    </div>
                    
                    <div style="text-align: center; margin-top: 30px;">
                        <button class="btn btn-secondary" onclick="sendWhatsApp('${bill.phone}', '${oti}', ${bill.amount})">
                            💬 Share via WhatsApp
                        </button>
                        
                        <button class="btn btn-back" onclick="window.print()">
                            🖨️ Print Receipt
                        </button>
                    </div>
                </div>
            `;
        }

        // ============================================
        // AUTO-LOAD RECEIPT FROM URL
        // ============================================
        
        window.onload = function() {
            // Check if URL has OTI parameter
            const urlParams = new URLSearchParams(window.location.search);
            const otiFromURL = urlParams.get('oti');
            
            if (otiFromURL) {
                const bill = getBill(otiFromURL.toUpperCase());
                if (bill) {
                    showSection('verify');
                    showReceipt(otiFromURL.toUpperCase(), bill);
                }
            }
        };
    </script>
</body>
</html>
